version: "3.8"

services:
  mailserver:
    image: mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail
    domainname: adpublicidad.co
    ports:
      - 25:25
      - 143:143
      - 587:587
    volumes:
      - ./maildata:/var/mail
      - ./mailstate:/var/mail-state
      - ./mailconfig:/tmp/docker-mailserver
    environment:
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=1
      - ONE_DIR=1
      - OVERRIDE_HOSTNAME=mail.adpublicidad.co
      - PERMIT_DOCKER=network
      - SPOOF_PROTECTION=0
      - PERMIT_MYNETWORKS=192.168.1.0/24
      - SSL_TYPE=
    networks:
      - red_sql_global
    restart: always

  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: roundcube-app
    ports:
      - 8888:80
    restart: always
    environment:
      ROUNDCUBEMAIL_DB_TYPE: mysql
      ROUNDCUBEMAIL_DB_HOST: MariaDB-Server
      ROUNDCUBEMAIL_DB_USER: root
      ROUNDCUBEMAIL_DB_PASSWORD: ServerAdSQL2026.
      ROUNDCUBEMAIL_DB_NAME: webmail_db
      ROUNDCUBEMAIL_DEFAULT_HOST: mailserver
      ROUNDCUBEMAIL_DEFAULT_PORT: 143
    networks:
      - red_sql_global

  imapsync:
    image: gilleslamiral/imapsync:latest
    container_name: imapsync
    restart: always
    command: sleep infinity
    networks:
      - red_sql_global

  mail-admin:
    build: ./mail-admin
    container_name: mail-admin
    ports:
      - 8889:80
    restart: always
    environment:
      ADMIN_USER: admin
      ADMIN_PASSWORD: CambiaEstaClave2026.
      DEFAULT_DOMAIN: adpublicidad.co
      ACCOUNTS_FILE: /mailconfig/postfix-accounts.cf
      ALIASES_FILE: /mailconfig/postfix-virtual.cf
      QUOTA_FILE: /mailconfig/dovecot-quotas.cf
    volumes:
      - ./mailconfig:/mailconfig
    networks:
      - red_sql_global

networks:
  red_sql_global:
    external: true
