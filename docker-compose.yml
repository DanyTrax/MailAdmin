version: "3.8"

# Pila completa: MariaDB + docker-mailserver + Roundcube + MailAdmin + imapsync
# Todo autocontenido en una red interna. Sólo necesitas un .env al lado.

services:

  # -------------------------------------------------------------------
  # Base de datos para Roundcube
  # -------------------------------------------------------------------
  mariadb:
    image: mariadb:10.11
    container_name: mail-mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -------------------------------------------------------------------
  # Servidor de correo (Postfix + Dovecot)
  # -------------------------------------------------------------------
  mailserver:
    image: mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail
    domainname: ${MAIL_DOMAIN}
    ports:
      - "25:25"
      - "143:143"
      - "587:587"
    volumes:
      - ./maildata:/var/mail
      - ./mailstate:/var/mail-state
      - ./mailconfig:/tmp/docker-mailserver
    environment:
      ENABLE_SPAMASSASSIN: 0
      ENABLE_CLAMAV: 0
      ENABLE_FAIL2BAN: 1
      ONE_DIR: 1
      OVERRIDE_HOSTNAME: mail.${MAIL_DOMAIN}
      PERMIT_DOCKER: network
      SPOOF_PROTECTION: 0
      PERMIT_MYNETWORKS: ${PERMIT_MYNETWORKS}
      SSL_TYPE: ""
    networks:
      - mailnet
    restart: always

  # -------------------------------------------------------------------
  # Webmail Roundcube
  # -------------------------------------------------------------------
  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: roundcube-app
    ports:
      - "8888:80"
    restart: always
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      ROUNDCUBEMAIL_DB_TYPE: mysql
      ROUNDCUBEMAIL_DB_HOST: mariadb
      ROUNDCUBEMAIL_DB_USER: ${DB_USER}
      ROUNDCUBEMAIL_DB_PASSWORD: ${DB_PASSWORD}
      ROUNDCUBEMAIL_DB_NAME: ${DB_NAME}
      ROUNDCUBEMAIL_DEFAULT_HOST: mailserver
      ROUNDCUBEMAIL_DEFAULT_PORT: 143
      ROUNDCUBEMAIL_SMTP_SERVER: mailserver
      ROUNDCUBEMAIL_SMTP_PORT: 587
    networks:
      - mailnet

  # -------------------------------------------------------------------
  # Panel CRUD de cuentas y alias
  # -------------------------------------------------------------------
  mail-admin:
    build:
      context: https://github.com/DanyTrax/MailAdmin.git#main:mail-admin
    image: mailadmin:latest
    container_name: mail-admin
    user: "0:0"
    ports:
      - "8889:80"
    restart: always
    environment:
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DEFAULT_DOMAIN: ${MAIL_DOMAIN}
      ACCOUNTS_FILE: /mailconfig/postfix-accounts.cf
      ALIASES_FILE: /mailconfig/postfix-virtual.cf
      QUOTA_FILE: /mailconfig/dovecot-quotas.cf
    volumes:
      - ./mailconfig:/mailconfig
    networks:
      - mailnet

  # -------------------------------------------------------------------
  # Utilidad para migrar buzones (opcional)
  # -------------------------------------------------------------------
  imapsync:
    image: gilleslamiral/imapsync:latest
    container_name: imapsync
    restart: always
    command: sleep infinity
    networks:
      - mailnet

networks:
  mailnet:
    driver: bridge

volumes:
  mariadb_data:
